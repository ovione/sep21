<div class="layout-container">
    @if(data) {
        @if(!showSpinner || configLayout().delegateBackendCalls) {
            <ng-container *ngTemplateOutlet="template();context:{config: configLayout(), data: data, filterCriteria: filterCriteria}"></ng-container>
        }
        @else() {
            <div id="loader-wrapper">
                <div id="loader"></div>
            </div>
        }
    }
</div>
